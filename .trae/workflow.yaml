# .trae/workflow.yaml
# SimTradeLab 多智能体工作流配置

project:
  name: SimTradeLab
  type: 量化策略开发
  root_dir: .

# 智能体角色定义
agents:
  arch:
    name: Strategy-Arch
    role: 策略架构师
    model: Kimi-K2.5  # 擅长规划
    output_dirs:
      - docs/
      - tasks/
    forbidden_dirs:
      - strategies/
      - workspace_qa/
  
  engr:
    name: Strategy-Engr
    role: 策略工程师
    model: Qwen3.5-Plus  # 擅长代码
    output_dirs:
      - strategies/
    forbidden_dirs:
      - docs/
      - workspace_qa/
  
  qa:
    name: Strategy-QA
    role: 策略 QA
    model: Kimi-K2.5  # 擅长审查
    output_dirs:
      - workspace_qa/
    forbidden_dirs:
      - strategies/
      - docs/

# 标准工作流程
workflow:
  # 阶段 1：策略设计
  - phase: DESIGN
    agent: arch
    task: "策略设计"
    inputs:
      - user_requirement  # 用户需求
    outputs:
      - docs/design_{strategy_name}.md
      - tasks/task_{strategy_name}_001.md
    next_phase: IMPLEMENT
    completion_criteria:
      - "设计文档已创建"
      - "任务单已分配给 engr"
  
  # 阶段 2：代码实现
  - phase: IMPLEMENT
    agent: engr
    task: "代码实现"
    inputs:
      - docs/design_{strategy_name}.md
    outputs:
      - strategies/{strategy_name}/backtest.py
      - strategies/{strategy_name}/stats/backtest_result.txt
    next_phase: REVIEW
    completion_criteria:
      - "策略代码已实现"
      - "回测已运行"
      - "已提交 qa 审查"
  
  # 阶段 3：质量审查
  - phase: REVIEW
    agent: qa
    task: "代码审查"
    inputs:
      - strategies/{strategy_name}/backtest.py
      - strategies/{strategy_name}/stats/backtest_result.txt
    outputs:
      - workspace_qa/reviews/review_{strategy_name}_001.md
      - workspace_qa/tests/test_{strategy_name}_001.txt
    next_phase: DECISION
    completion_criteria:
      - "审查报告已创建"
      - "测试已运行"
      - "已提交 arch 验收"
  
  # 阶段 4：最终决策
  - phase: DECISION
    agent: arch
    task: "最终验收"
    inputs:
      - workspace_qa/reviews/review_{strategy_name}_001.md
    outputs:
      - docs/final_{strategy_name}_001.md
    next_phase: COMPLETED
    completion_criteria:
      - "验收报告已创建"
      - "任务状态标记为完成"

# 任务状态管理
task_states:
  pending: "待执行"
  in_progress: "执行中"
  completed: "已完成"
  failed: "失败"

# 文件权限控制
file_permissions:
  arch:
    read:
      - docs/**
      - tasks/**
      - workspace_qa/reviews/**
    write:
      - docs/**
      - tasks/**
  engr:
    read:
      - docs/**
      - strategies/**
    write:
      - strategies/**
  qa:
    read:
      - strategies/**
      - strategies/**/stats/**
    write:
      - workspace_qa/**